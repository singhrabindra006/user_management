name: weather_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_lucide: ^1.11.0
  intl: ^0.19.0
  http: ^1.6.0
  flutter_dotenv: ^5.0.0
  geolocator: ^10.1.0
  permission_handler: ^11.0.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0 
  flutter_lints: ^6.0.0

flutter_native_splash:
  color: "#ffffff"
  image: lib/images/weather_logo.png
  android: true
  ios: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/images/weather_logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "lib/images/weather_logo.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - lib/images/
    - lib/images/weather_logo.png